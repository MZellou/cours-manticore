project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "pages/theorie/**/*.qmd"
    - "pages/mission/**/*.qmd"
    - "pages/roles/*.qmd"
    - "pages/corriges/*.qmd"
    - "pages/reference/*.qmd"
  resources:
    - "pages/assets/**"

website:
  title: "Opération Manticore"
  description: "Cours BDD NoSQL — Graph + Spatial · PostGIS + pgRouting + Neo4j"
  repo-url: https://github.com/mzellou/cours-manticore
  repo-actions: [edit, issue]
  page-navigation: true
  search:
    type: overlay
  navbar:
    background: dark
    left:
      - text: Accueil
        href: index.qmd
      - text: Théorie
        href: pages/theorie/index.qmd
      - text: Mission
        href: pages/mission/index.qmd
      - text: Rôles
        href: pages/roles/attaque.qmd
      - text: Corrigés
        href: pages/corriges/phase_1.qmd
      - text: Référence
        href: pages/reference/setup.qmd
    right:
      - icon: github
        href: https://github.com/mzellou/cours-manticore

  sidebar:
    - title: "Théorie"
      style: docked
      contents:
        - pages/theorie/index.qmd
        - section: "Fondements"
          contents:
            - pages/theorie/fondements/pourquoi.qmd
            - pages/theorie/fondements/modele_bdtopo.qmd
        - section: "Outils"
          contents:
            - pages/theorie/outils/postgis.qmd
            - pages/theorie/outils/cypher_5min.qmd
            - pages/theorie/outils/graphdb_101.qmd
            - pages/theorie/outils/pgrouting.qmd
            - pages/theorie/outils/sql_recursion.qmd
            - pages/theorie/outils/apoc_basics.qmd
        - section: "Avancé"
          contents:
            - pages/theorie/avance/apoc.qmd
            - pages/theorie/avance/contenu_donnees.qmd

    - title: "Mission"
      style: docked
      contents:
        - pages/mission/index.qmd
        - pages/mission/briefing.qmd
        - pages/mission/phase_1.qmd
        - pages/mission/checkpoint_1.qmd
        - pages/mission/transition_1_2.qmd
        - pages/mission/phase_2.qmd
        - pages/mission/checkpoint_2.qmd
        - pages/mission/transition_2_3.qmd
        - pages/mission/phase_3.qmd
        - pages/mission/debriefing.qmd

    - title: "Rôles"
      style: docked
      contents:
        - pages/roles/attaque.qmd
        - pages/roles/defense.qmd
        - pages/roles/logistique.qmd

    - title: "Corrigés"
      style: docked
      contents:
        - pages/corriges/phase_1.qmd
        - pages/corriges/phase_2.qmd
        - pages/corriges/phase_3.qmd
        - pages/corriges/bonus.qmd

    - title: "Référence"
      style: docked
      contents:
        - pages/reference/setup.qmd
        - pages/reference/scripts.qmd
        - pages/reference/faq.qmd
        - pages/reference/glossaire.qmd
        - pages/reference/instructeur.qmd

  page-footer:
    left: "Opération Manticore · IGN/MSST"
    right: "Build avec [Quarto](https://quarto.org)"

format:
  html:
    theme:
      dark: [darkly]
      light: [cosmo]
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    code-line-numbers: false
    link-external-newwindow: true
    smooth-scroll: true
    fontsize: 1rem

filters:
  - quizdown
