<style>
  .site-footer { display: none !important; }

  /* Encart "Réflexion guidée" : questions LLM + mini-défis */
  .reflexion {
    border-left: 4px solid #f0a050;
    background: rgba(240, 160, 80, 0.08);
    padding: 0.8em 1.1em;
    margin: 1.2em 0;
    border-radius: 4px;
  }
  .reflexion > p:first-child { margin-top: 0; }
  .reflexion > *:last-child { margin-bottom: 0; }

  /* Encart "Checkpoint" : validation de fin de phase */
  .checkpoint {
    border-left: 4px solid #58c08f;
    background: rgba(88, 192, 143, 0.08);
    padding: 0.8em 1.1em;
    margin: 1.2em 0;
    border-radius: 4px;
  }
  .checkpoint > p:first-child { margin-top: 0; }
  .checkpoint > *:last-child { margin-bottom: 0; }

  /* Encart "Théorie pré-requise" : pointeurs vers pages théorie */
  .prereq-theorie {
    border-left: 4px solid #6aa1f0;
    background: rgba(106, 161, 240, 0.08);
    padding: 0.7em 1.1em;
    margin: 1em 0;
    border-radius: 4px;
    font-size: 0.95em;
  }
  .prereq-theorie > p:first-child { margin-top: 0; }
  .prereq-theorie > *:last-child { margin-bottom: 0; }

  /* Boutons précédent/suivant */
  .nav-phase {
    margin-top: 2em;
    padding-top: 1em;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .nav-phase table { width: 100%; }

  /* ══════════════════════════════════
     SOLUTION BLOCKS — static copiable
     ══════════════════════════════════ */

  /* Wider content area on desktop */
  @media (min-width: 50rem) {
    .main-wrapper {
      max-width: 1100px !important;
    }
  }

  /* Solution block container */
  .solution-block {
    margin: 1.2em 0;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.12);
    overflow: hidden;
    background: rgba(255,255,255,0.02);
  }

  /* Header bar: label + copy button */
  .solution-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.45em 1em;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 0.82rem;
  }

  .solution-label {
    font-weight: 600;
    color: #e8eaed;
    font-family: monospace;
    letter-spacing: 0.02em;
  }

  /* Copy button */
  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    background: transparent;
    color: #9aa0a6;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: inherit;
  }
  .copy-btn:hover {
    background: rgba(255,255,255,0.08);
    color: #e8eaed;
    border-color: rgba(255,255,255,0.3);
  }
  .copy-btn.copied {
    color: #58c08f;
    border-color: rgba(88,192,143,0.5);
  }

  /* Code blocks inside solution */
  .solution-block .highlighter-rouge {
    margin: 0;
    border-radius: 0;
    border: none;
  }
  .solution-block .highlighter-rouge pre {
    margin: 0;
    padding: 1em 1.2em;
  }
  .solution-block .highlight {
    max-height: 520px;
    overflow-y: auto;
  }

  /* Multiple code blocks in one solution */
  .solution-block .highlighter-rouge + .highlighter-rouge {
    border-top: 1px solid rgba(255,255,255,0.07);
  }

  /* prose between code blocks in solution */
  .solution-block > p {
    padding: 0.5em 1.2em;
    margin: 0;
    font-size: 0.9em;
    color: #b0b8c1;
  }
  .solution-block > p:first-child {
    padding-top: 0.8em;
  }

  /* Slides toggle button */
  .slides-toggle-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border: 1px solid rgba(88,166,255,0.4);
    border-radius: 4px;
    background: rgba(88,166,255,0.08);
    color: #58a6ff;
    font-size: 0.8rem;
    cursor: pointer;
    text-decoration: none;
    margin-bottom: 1rem;
    transition: all 0.15s ease;
  }
  .slides-toggle-btn:hover {
    background: rgba(88,166,255,0.15);
    border-color: #58a6ff;
  }
</style>

<script>
  (function() {
    // Slides mode: detect ?slides=1 and transform page into presentation
    document.addEventListener('DOMContentLoaded', function() {
      var params = new URLSearchParams(window.location.search);
      if (params.get('slides') !== '1') {
        // Add toggle button on Théorie pages
        var isTheorie = window.location.pathname.includes('/theorie');
        if (isTheorie) {
          var main = document.querySelector('main') || document.querySelector('#main-content');
          if (main) {
            var btn = document.createElement('a');
            var url = new URL(window.location);
            url.searchParams.set('slides', '1');
            btn.href = url.toString();
            btn.className = 'slides-toggle-btn';
            btn.innerHTML = '⛶ Mode Slides';
            btn.style.float = 'right';
            main.insertBefore(btn, main.firstChild);
          }
        }
        return;
      }

      // ── SLIDES MODE ── Transform the page into a slide deck
      var main = document.querySelector('#main-content') || document.querySelector('main');
      if (!main) return;
      var html = main.innerHTML;

      // Parse content into slides (split on <h2)
      var parts = html.split(/<h2[^>]*>/i);
      var slides = [];
      var pageTitle = document.querySelector('h1') ? document.querySelector('h1').textContent.trim() : 'Slides';

      parts.forEach(function(part, i) {
        if (i === 0) {
          // Before first h2 = intro / title
          var h1close = part.replace(/^[\s\S]*?<\/h1>/i, '');
          if (h1close.trim()) slides.push({ title: pageTitle, html: h1close });
          return;
        }
        // Each part starts with the h2 content (after the tag, since we split on the tag)
        var titleEnd = part.indexOf('</h2>');
        var title = titleEnd > 0 ? part.substring(0, titleEnd) : 'Slide ' + (slides.length + 1);
        var content = titleEnd > 0 ? part.substring(titleEnd + 5) : part;
        if (content.trim()) slides.push({ title: title.trim(), html: content });
      });

      if (slides.length === 0) return;

      // Build slide deck DOM
      document.head.innerHTML = '<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>' + pageTitle + '</title>' +
        '<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:#0d1117;color:#e6edf3;overflow:hidden;height:100vh}.deck{width:100%;height:calc(100vh - 42px)}.slide{display:none;position:absolute;inset:0;padding:3rem 5rem;overflow-y:auto;font-size:1.5rem;line-height:1.6;flex-direction:column;justify-content:center}.slide.active{display:flex}.slide:first-child{text-align:center}h1{font-size:2.4rem;color:#58a6ff;margin-bottom:1rem}h2{display:none}h3{font-size:1.8rem;color:#d2a8ff;margin:1.2rem 0 .6rem}p{margin:.6rem 0}blockquote{border-left:4px solid #f0883e;background:rgba(240,136,62,.1);padding:1rem 1.5rem;margin:1rem 0;border-radius:4px;font-style:italic}pre{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:1rem 1.5rem;margin:1rem 0;font-size:1.1rem;overflow-x:auto}code{font-family:SF Mono,Fira Code,monospace}:not(pre)>code{background:#161b22;padding:2px 6px;border-radius:3px;font-size:1.2rem}table{border-collapse:collapse;margin:1rem 0;width:100%;font-size:1.15rem}th{background:#161b22;color:#58a6ff}th,td{border:1px solid #30363d;padding:.5rem .8rem;text-align:left}tr:nth-child(even){background:rgba(255,255,255,.03)}ul,ol{margin:.5rem 0 .5rem 2rem}li{margin:.3rem 0}hr{display:none}a{color:#58a6ff;text-decoration:none}.nav{position:fixed;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:.4rem 1.5rem;background:#161b22;border-top:1px solid #30363d;font-size:.85rem;z-index:100}.nav button{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:.35rem .9rem;border-radius:4px;cursor:pointer}.nav button:hover{background:#30363d}.counter{color:#8b949e}.titlebar{color:#8b949e;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 1rem}.exit{color:#f85149}</style>';

      document.body.innerHTML = '';
      var deck = document.createElement('div');
      deck.className = 'deck';
      document.body.appendChild(deck);

      slides.forEach(function(s, i) {
        var div = document.createElement('div');
        div.className = 'slide' + (i === 0 ? ' active' : '');
        div.innerHTML = s.html;
        deck.appendChild(div);
      });

      var nav = document.createElement('div');
      nav.className = 'nav';
      nav.innerHTML = '<button onclick="window._s(window._i-1)">← Préc.</button>' +
        '<span class="titlebar" id="st"></span><span class="counter" id="sc"></span>' +
        '<button onclick="window._s(window._i+1)">Suiv. →</button>' +
        '<button class="exit" onclick="window._x()">✕</button>';
      document.body.appendChild(nav);

      window._i = 0;
      window._s = function(i) {
        window._i = Math.max(0, Math.min(slides.length - 1, i));
        deck.querySelectorAll('.slide').forEach(function(s, j) { s.classList.toggle('active', j === window._i); });
        document.getElementById('sc').textContent = (window._i + 1) + ' / ' + slides.length;
        document.getElementById('st').textContent = slides[window._i].title;
      };
      window._x = function() { var u = new URL(window.location); u.searchParams.delete('slides'); window.location.href = u.toString(); };
      window._s(0);

      document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); window._s(window._i + 1); }
        else if (e.key === 'ArrowLeft') { e.preventDefault(); window._s(window._i - 1); }
        else if (e.key === 'Escape') window._x();
        else if (e.key === 'f' || e.key === 'F') { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
      });
    });

    document.addEventListener('DOMContentLoaded', attachAll);

    function attachAll() {
      document.querySelectorAll('.solution-block').forEach(attachCopy);
    }

    function attachCopy(block) {
      var btn = block.querySelector('.copy-btn');
      if (!btn || btn.dataset.attached) return;
      btn.dataset.attached = 'true';
      btn.addEventListener('click', function() {
        var code = block.querySelector('code');
        if (!code) return;
        navigator.clipboard.writeText(code.innerText).then(function() {
          btn.classList.add('copied');
          var lbl = btn.querySelector('.copy-label');
          if (lbl) lbl.textContent = 'Copié !';
          setTimeout(function() {
            btn.classList.remove('copied');
            if (lbl) lbl.textContent = 'Copier';
          }, 2000);
        });
      });
    }

    // MutationObserver for any late-rendered blocks
    var observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        m.addedNodes.forEach(function(n) {
          if (n.classList && n.classList.contains('solution-block')) attachCopy(n);
        });
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
  })();
</script>
