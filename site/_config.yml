title: Opération Manticore
description: Cours BDD NoSQL — Graph + Spatial | PostGIS + pgRouting + Neo4j
theme: just-the-docs
url: "https://cours-manticore.pages.dev"
baseurl: ""

collections:
  docs:
    output: true
    permalink: /:path/

nav:
  - title: Missions
    children:
      - title: Briefing général
        url: /missions/briefing/
      - title: "Phase 1 — Reconnaissance"
        url: /missions/phase_1_reconnaissance/
      - title: "Phase 2 — Cartographie"
        url: /missions/phase_2_cartographie/
      - title: "Phase 3 — Simulation"
        url: /missions/phase_3_simulation/
      - title: Debriefing
        url: /missions/debriefing/
  - title: Rôles
    children:
      - title: Attaque
        url: /roles/attaque/
      - title: Défense
        url: /roles/defense/
      - title: Ravitaillement
        url: /roles/ravitaillement/
      - title: Énergie
        url: /roles/energie/
  - title: Théorie
    children:
      - title: BDD NoSQL (slides)
        url: /theorie/bdd_nosql/
      - title: Contenu des données
        url: /theorie/contenu_donnees/
  - title: Instructeur
    url: /instructor/

color_scheme: dark

defaults:
  - scope:
      path: "_docs/missions"
      type: "docs"
    values:
      layout: default
      parent: Missions
  - scope:
      path: "_docs/missions/briefing.md"
      type: "docs"
    values:
      nav_order: 1
  - scope:
      path: "_docs/missions/phase_1_reconnaissance.md"
      type: "docs"
    values:
      nav_order: 2
  - scope:
      path: "_docs/missions/phase_2_cartographie.md"
      type: "docs"
    values:
      nav_order: 3
  - scope:
      path: "_docs/missions/phase_3_simulation.md"
      type: "docs"
    values:
      nav_order: 4
  - scope:
      path: "_docs/missions/debriefing.md"
      type: "docs"
    values:
      nav_order: 5
  - scope:
      path: "_docs/roles"
      type: "docs"
    values:
      layout: default
      parent: Rôles
  - scope:
      path: "_docs/roles/attaque.md"
      type: "docs"
    values:
      nav_order: 1
  - scope:
      path: "_docs/roles/defense.md"
      type: "docs"
    values:
      nav_order: 2
  - scope:
      path: "_docs/roles/energie.md"
      type: "docs"
    values:
      nav_order: 3
  - scope:
      path: "_docs/roles/ravitaillement.md"
      type: "docs"
    values:
      nav_order: 4
