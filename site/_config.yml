title: Opération Manticore
description: Cours BDD NoSQL — Graph + Spatial | PostGIS + pgRouting + Neo4j
theme: just-the-docs
url: "https://mzellou.github.io"
baseurl: "/cours-manticore"

collections:
  docs:
    output: true
    permalink: /:path/

just_the_docs:
  collections:
    docs:
      nav_exclude: false

color_scheme: dark

# Recherche plein-texte (just-the-docs)
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

# Fil d'Ariane
breadcrumbs: true

# Liens externes utiles dans la nav
nav_external_links:
  - title: Repo GitHub
    url: https://github.com/mzellou/cours-manticore
    hide_icon: false
